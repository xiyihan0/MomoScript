name: Editor Runtime

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: editor-runtime-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.22.0
  RUST_TOOLCHAIN: 1.92.0
  WASM_PACK_VERSION: 0.15.0
  TYPST_VERSION: 0.15.0
  TYPST_LINUX_SHA256: 59b207df01be2dab9f13e80f73d04d7ff8273ffd46b3dd1b9eef5c60f3eeabea
  TINYMIST_REVISION: 3d63da4f93c54ddef0c63e1a6237d67aee13f5fe
  TYPST_TS_REVISION: e1974e566ba63dcf8ecdd6730cff25de26c7dbd2
  TYPST_TS_RUST_TOOLCHAIN: 1.96.0
  TYPST_TS_BINARYEN_VERSION: 116
  TYPST_TS_BINARYEN_SHA256: c55b74f3109cdae97490faf089b0286d3bba926bb6ea5ed00c8c784fc53718fd

jobs:
  core-native:
    name: core-native
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install AVIF decoder
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libavif-bin
      - name: Install pinned Typst CLI
        run: |
          archive="/tmp/typst-x86_64-unknown-linux-musl.tar.xz"
          curl --fail --location --silent --show-error \
            "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" \
            --output "$archive"
          echo "${TYPST_LINUX_SHA256}  ${archive}" | sha256sum --check
          tar --extract --xz --file "$archive" --directory /tmp
          sudo install "/tmp/typst-x86_64-unknown-linux-musl/typst" /usr/local/bin/typst
          typst --version
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
      - name: Test Rust language core
        run: cargo test --locked --manifest-path mmt_rs/Cargo.toml --all-targets
      - name: Test native language server
        run: cargo test --locked --manifest-path mmt_lsp/Cargo.toml --all-targets

  tinymist-compatibility:
    name: tinymist-compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install pinned Rust and wasm-pack
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown
          rustup default "$RUST_TOOLCHAIN"
          cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Build MomoScript Web language server
        working-directory: editors/vscode
        run: npm run build:wasm
      - name: Check out pinned Tinymist source
        run: |
          git clone --filter=blob:none https://github.com/Myriad-Dreamin/tinymist.git "$RUNNER_TEMP/tinymist"
          git -C "$RUNNER_TEMP/tinymist" checkout --detach "$TINYMIST_REVISION"
      - name: Restore pinned Tinymist artifacts
        id: tinymist-artifact-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/tinymist/target/release/tinymist
            ${{ runner.temp }}/tinymist/crates/tinymist/pkg/tinymist.js
            ${{ runner.temp }}/tinymist/crates/tinymist/pkg/tinymist_bg.wasm
            ${{ runner.temp }}/tinymist/crates/tinymist/pkg/package.json
          key: tinymist-v2-${{ runner.os }}-${{ runner.arch }}-${{ env.RUST_TOOLCHAIN }}-${{ env.TINYMIST_REVISION }}-${{ hashFiles('third_party/tinymist/pin.json', 'third_party/tinymist/patches/*.patch') }}
      - name: Apply maintained patch and verify pinned artifacts
        env:
          TINYMIST_SRC: ${{ runner.temp }}/tinymist
          CACHE_HIT: ${{ steps.tinymist-artifact-cache.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            node editors/vscode/scripts/patch-tinymist-artifacts.mjs promote
          else
            node editors/vscode/scripts/patch-tinymist-artifacts.mjs build-promote
          fi
      - name: Verify native and Web compatibility transcripts
        working-directory: editors/vscode
        env:
          TINYMIST_BIN: ${{ runner.temp }}/tinymist/target/release/tinymist
          TINYMIST_WEB_PKG: ${{ runner.temp }}/tinymist/crates/tinymist/pkg
          TINYMIST_SHA256_FILE: ${{ runner.temp }}/tinymist/target/release/tinymist-native-patched.sha256
          TINYMIST_WEB_SHA256_FILE: ${{ runner.temp }}/tinymist/crates/tinymist/pkg/SHA256SUMS
        run: |
          npm run test:tinymist-process
          npm run test:tinymist-worker
          node ./scripts/test-navigation-artifacts.mjs
      - name: Stage immutable Tinymist artifacts
        run: |
          mkdir -p .ci/tinymist/native .ci/tinymist/web
          cp "$RUNNER_TEMP/tinymist/target/release/tinymist" .ci/tinymist/native/tinymist
          cp "$RUNNER_TEMP/tinymist/target/release/tinymist-native-patched.sha256" .ci/tinymist/native/tinymist-native-patched.sha256
          cp "$RUNNER_TEMP/tinymist/crates/tinymist/pkg/tinymist.js" .ci/tinymist/web/tinymist.js
          cp "$RUNNER_TEMP/tinymist/crates/tinymist/pkg/tinymist_bg.wasm" .ci/tinymist/web/tinymist_bg.wasm
          cp "$RUNNER_TEMP/tinymist/crates/tinymist/pkg/package.json" .ci/tinymist/web/package.json
          cp "$RUNNER_TEMP/tinymist/crates/tinymist/pkg/SHA256SUMS" .ci/tinymist/web/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: tinymist-pinned-linux-x64
          path: .ci/tinymist
          compression-level: 0
          if-no-files-found: error

  typst-compiler-compatibility:
    name: typst-compiler-compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pinned Rust and wasm-pack
        run: |
          rustup toolchain install "$TYPST_TS_RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown
          rustup default "$TYPST_TS_RUST_TOOLCHAIN"
          cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
      - name: Install pinned Binaryen
        run: |
          archive="$RUNNER_TEMP/binaryen-version_${TYPST_TS_BINARYEN_VERSION}-x86_64-linux.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/WebAssembly/binaryen/releases/download/version_${TYPST_TS_BINARYEN_VERSION}/binaryen-version_${TYPST_TS_BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            --output "$archive"
          echo "${TYPST_TS_BINARYEN_SHA256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          binaryen_bin="$RUNNER_TEMP/binaryen-version_${TYPST_TS_BINARYEN_VERSION}/bin"
          echo "$binaryen_bin" >> "$GITHUB_PATH"
          "$binaryen_bin/wasm-opt" --version | grep -F "version_${TYPST_TS_BINARYEN_VERSION}"
      - name: Check out pinned typst.ts source
        run: |
          git clone --filter=blob:none https://github.com/Myriad-Dreamin/typst.ts.git "$RUNNER_TEMP/typst.ts"
          git -C "$RUNNER_TEMP/typst.ts" checkout --detach "$TYPST_TS_REVISION"
      - name: Apply maintained debug-span patch
        run: git -C "$RUNNER_TEMP/typst.ts" apply "$GITHUB_WORKSPACE/third_party/typst-ts/patches/0001-expose-render-debug-spans.patch"
      - name: Build and verify pinned Typst runtime artifacts
        working-directory: ${{ runner.temp }}/typst.ts/packages/compiler
        run: |
          wasm-pack build --target web --scope myriaddreamin --release -- --no-default-features --features web,misc
          node ../tools/wasm-debundle.mjs
          echo "fff6c8d9852edbfb0374722c139a95a2307de19a666206936232e5f21035836c  pkg/typst_ts_web_compiler_bg.wasm" | sha256sum --check
          echo "94d91940b1cc6242009962e42e31da2438f9879239efa572e3d4a92eb61e3507  pkg/typst_ts_web_compiler.mjs" | sha256sum --check
          echo "94d91940b1cc6242009962e42e31da2438f9879239efa572e3d4a92eb61e3507  $GITHUB_WORKSPACE/third_party/typst-ts/pkg/typst_ts_web_compiler.mjs" | sha256sum --check

  extension-desktop:
    name: extension-desktop
    needs: tinymist-compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Install pinned Rust and wasm-pack
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown
          rustup default "$RUST_TOOLCHAIN"
          cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
      - uses: actions/download-artifact@v4
        with:
          name: tinymist-pinned-linux-x64
          path: .ci/tinymist
      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Verify Desktop extension contracts
        working-directory: editors/vscode
        env:
          TINYMIST_BIN: ${{ github.workspace }}/.ci/tinymist/native/tinymist
          TINYMIST_WEB_PKG: ${{ github.workspace }}/.ci/tinymist/web
          TINYMIST_SHA256_FILE: ${{ github.workspace }}/.ci/tinymist/native/tinymist-native-patched.sha256
          TINYMIST_WEB_SHA256_FILE: ${{ github.workspace }}/.ci/tinymist/web/SHA256SUMS
        run: |
          chmod +x "$TINYMIST_BIN"
          npm run build:wasm
          npm run check
          npm run test:grammar
          npm run test:position-domains
          npm run test:capability-manifest
          npm run test:provider-descriptors
          npm run test:provider-payload-negative
          npm run test:projected-edits
          npm run test:projected-payload
          node ./scripts/test-navigation-providers.mjs
          node ./scripts/test-multi-document-projected-edits.mjs
          npm run test:desktop-preview
          npm run test:typst-package
          npm run test:desktop

  extension-web:
    name: extension-web
    needs: [tinymist-compatibility, typst-compiler-compatibility]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            editors/vscode/package-lock.json
            editors/vscode-web/package-lock.json
      - name: Install pinned Rust and wasm-pack
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target wasm32-unknown-unknown
          rustup default "$RUST_TOOLCHAIN"
          cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked
      - uses: actions/download-artifact@v4
        with:
          name: tinymist-pinned-linux-x64
          path: .ci/tinymist
      - name: Install editor dependencies
        run: |
          npm ci --prefix editors/vscode
          npm ci --prefix editors/vscode-web
      - name: Verify Web extension and runtime contracts
        env:
          TINYMIST_WEB_PKG: ${{ github.workspace }}/.ci/tinymist/web
          TINYMIST_WEB_SHA256_FILE: ${{ github.workspace }}/.ci/tinymist/web/SHA256SUMS
        run: |
          npm --prefix editors/vscode run build:wasm
          npm --prefix editors/vscode run check
          npm --prefix editors/vscode run test:tinymist-worker
          npm --prefix editors/vscode run test:web
          npm --prefix editors/vscode-web run check
          npm --prefix editors/vscode-web run test:resource-cache
          npm --prefix editors/vscode-web run test:resource-fetch-cache
          npm --prefix editors/vscode-web run test:resource-materializer
          npm --prefix editors/vscode-web run test:preview-diagnostics
          npm --prefix editors/vscode-web run test:preview-artifact
          npm --prefix editors/vscode-web run test:runtime-controller
          npm --prefix editors/vscode-web run test:pwa-quiesce
          npm --prefix editors/vscode-web run test:workspace-atomic-apply
          npm --prefix editors/vscode-web run test:origin-storage
          npm --prefix editors/vscode-web run test:exact-export
          npm --prefix editors/vscode-web run test:preview-interaction

  production-e2e:
    name: production-e2e
    needs: [tinymist-compatibility, extension-web]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            editors/vscode/package-lock.json
            editors/vscode-web/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: tinymist-pinned-linux-x64
          path: .ci/tinymist
      - name: Install production editor dependencies
        run: |
          npm ci --prefix editors/vscode
          npm ci --prefix editors/vscode-web
          npx --prefix editors/vscode-web playwright install --with-deps chrome
      - name: Run real-Chrome production editor journeys
        working-directory: editors/vscode-web
        env:
          TINYMIST_WEB_PKG: ${{ github.workspace }}/.ci/tinymist/web
        run: |
          npm run test:e2e:chrome
          npm run test:e2e:lifecycle
      - name: Upload E2E failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-e2e-test-results
          path: editors/vscode-web/test-results/
          if-no-files-found: ignore
          retention-days: 14
